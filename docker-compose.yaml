---
services:
  e2e:
    build:
      context: ldap-manager
      target: e2e

  prek:
    build:
      context: .
      dockerfile: .github/prek/Dockerfile
    user: ${PREK_UID:-1000}:${PREK_GID:-1000}
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      HOME: /tmp
    command: [sh, -c, git config --global --add safe.directory /workspace && prek run --all-files]

  release:
    build:
      context: .
      dockerfile: .github/release/Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      GITHUB_ACTOR: ${GITHUB_ACTOR:-local}
      GH_TOKEN: ${GH_TOKEN:-dummy}
    entrypoint: [bash, .github/scripts/chart-oci-release.sh]
