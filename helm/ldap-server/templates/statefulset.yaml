---
{
  apiVersion: "apps/v1",
  kind: "StatefulSet",
  metadata: {
    name: {{ include "common.names.fullname" . | quote }},
    labels: {{ include "common.labels.standard" (dict "customLabels" .Values.additionalLabels "context" $) | fromYaml | toJson }},
    {{ if .Values.additionalAnnotations }}
    annotations: {{ .Values.additionalAnnotations | toJson }},
    {{ end }}
  },
  spec: {
    serviceName: {{ include "common.names.fullname" . | quote }},
    replicas: 1,
    selector: {
      matchLabels: {{ include "common.labels.matchLabels" (dict "customLabels" .Values.additionalLabels "context" $) | fromYaml | toJson }},
    },
    template: {
      metadata: {
        labels: {{ include "common.labels.standard" (dict "customLabels" .Values.additionalLabels "context" $) | fromYaml | toJson }},
      },
      spec: {
        initContainers: [{
          name: "ldap-manager-setup",
          image: {{ include "common.images.image" (dict "imageRoot" .Values.ldapManager.image "global" .Values.global "chart" .Chart) | quote }},
          imagePullPolicy: {{ coalesce .Values.ldapManager.image.pullPolicy ((.Values.global).imagePullPolicy) "IfNotPresent" | quote }},
          args: ["setup"],
          env: [{
            name: "LDAP_ADMIN_PW",
            valueFrom: {
              secretKeyRef: {
                name: {{ include "nubus-common.secrets.name" (dict "existingSecret" .Values.ldapServer.auth.existingSecret "defaultNameSuffix" "admin" "context" .) | quote }},
                key: {{ include "nubus-common.secrets.key" (dict "existingSecret" .Values.ldapServer.auth.existingSecret "key" "password" "context" .) | quote }},
              },
            },
          }],
          {{ if .Values.ldapManager.resources }}
          resources: {{ .Values.ldapManager.resources | toJson }},
          {{ end }}
          volumeMounts: [
            {name: "data", mountPath: "/var/lib/ldap"},
            {name: "run", mountPath: "/var/run/slapd"},
            {name: "etc-ldap", mountPath: "/etc/ldap/auth"},
            {name: "ldap-manager-config", mountPath: "/etc/ldap-manager/config.json", subPath: "config.json"},
          ],
        }],
        containers: [
          {
            name: "slapd",
            image: {{ include "common.images.image" (dict "imageRoot" .Values.ldapServer.image "global" .Values.global "chart" .Chart) | quote }},
            imagePullPolicy: {{ coalesce .Values.ldapServer.image.pullPolicy ((.Values.global).imagePullPolicy) "IfNotPresent" | quote }},
            command: ["slapd"],
            args: [
              "-f", "/etc/ldap/slapd.conf",
              "-d", {{ .Values.ldapServer.config.logLevel | quote }},
              "-h", "ldap://:389/ ldapi:///",
            ],
            ports: [{
              name: "ldap",
              containerPort: 389,
              protocol: "TCP",
            }],
            livenessProbe: {
              httpGet: {path: "/healthz", port: 8080},
              initialDelaySeconds: 5,
              periodSeconds: 10,
            },
            readinessProbe: {
              httpGet: {path: "/readyz", port: 8080},
              initialDelaySeconds: 5,
              periodSeconds: 10,
            },
            {{ if .Values.ldapServer.resources }}
            resources: {{ .Values.ldapServer.resources | toJson }},
            {{ end }}
            volumeMounts: [
              {name: "data", mountPath: "/var/lib/ldap"},
              {name: "run", mountPath: "/var/run/slapd"},
              {name: "etc-ldap", mountPath: "/etc/ldap/auth"},
              {name: "slapd-conf", mountPath: "/etc/ldap/slapd.conf", subPath: "slapd.conf"},
            ],
          },
          {
            name: "ldap-manager-sidecar",
            image: {{ include "common.images.image" (dict "imageRoot" .Values.ldapManager.image "global" .Values.global "chart" .Chart) | quote }},
            imagePullPolicy: {{ coalesce .Values.ldapManager.image.pullPolicy ((.Values.global).imagePullPolicy) "IfNotPresent" | quote }},
            args: ["sidecar"],
            env: [
              {
                name: "LDAP_ADMIN_PW",
                valueFrom: {
                  secretKeyRef: {
                    name: {{ include "nubus-common.secrets.name" (dict "existingSecret" .Values.ldapServer.auth.existingSecret "defaultNameSuffix" "admin" "context" .) | quote }},
                    key: {{ include "nubus-common.secrets.key" (dict "existingSecret" .Values.ldapServer.auth.existingSecret "key" "password" "context" .) | quote }},
                  },
                },
              },
            ],
            ports: [{
              name: "health",
              containerPort: 8080,
              protocol: "TCP",
            }],
            {{ if .Values.ldapManager.resources }}
            resources: {{ .Values.ldapManager.resources | toJson }},
            {{ end }}
            volumeMounts: [
              {name: "data", mountPath: "/var/lib/ldap"},
              {name: "ldap-manager-config", mountPath: "/etc/ldap-manager/config.json", subPath: "config.json"},
              {{ if or .Values.seedData.existingConfigMap .Values.seedData.content .Values.seedData.file }}
              {name: "seed-ldif", mountPath: "/seed"},
              {{ end }}
            ],
          },
        ],
        volumes: [
          {name: "run", emptyDir: {}},
          {name: "etc-ldap", emptyDir: {}},
          {name: "ldap-manager-config", configMap: {name: {{ printf "%s-ldap-manager" (include "common.names.fullname" .) | quote }}}},
          {name: "slapd-conf", configMap: {name: {{ if .Values.slapdConf.existingConfigMap }}{{ .Values.slapdConf.existingConfigMap | quote }}{{ else }}{{ printf "%s-slapd-conf" (include "common.names.fullname" .) | quote }}{{ end }}}},
          {{ if or .Values.seedData.existingConfigMap .Values.seedData.content .Values.seedData.file }}
          {name: "seed-ldif", configMap: {name: {{ if .Values.seedData.existingConfigMap }}{{ .Values.seedData.existingConfigMap | quote }}{{ else }}{{ printf "%s-seed-ldif" (include "common.names.fullname" .) | quote }}{{ end }}}},
          {{ end }}
          {{ if not .Values.persistence.enabled }}
          {name: "data", emptyDir: {}},
          {{ end }}
        ],
        nodeSelector: {{ .Values.nodeSelector | toJson }},
        tolerations: {{ .Values.tolerations | toJson }},
        {{ if .Values.topologySpreadConstraints }}
        topologySpreadConstraints: {{ .Values.topologySpreadConstraints | toJson }},
        {{ end }}
      },
    },
    {{ if .Values.persistence.enabled }}
    volumeClaimTemplates: [{
      metadata: {name: "data"},
      spec: {
        accessModes: ["ReadWriteOnce"],
        {{ if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }},
        {{ end }}
        resources: {
          requests: {
            storage: {{ .Values.persistence.size | quote }},
          },
        },
      },
    }],
    {{ end }}
  },
}
