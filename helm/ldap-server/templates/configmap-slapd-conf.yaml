{{ if not .Values.slapdConf.existingConfigMap }}
---
{
  apiVersion: "v1",
  kind: "ConfigMap",
  metadata: {
    name: {{ printf "%s-slapd-conf" .Release.Name | quote }},
    labels: {
      app.kubernetes.io/name: {{ .Chart.Name | quote }},
      app.kubernetes.io/instance: {{ .Release.Name | quote }},
      app.kubernetes.io/version: {{ .Chart.AppVersion | quote }},
      app.kubernetes.io/managed-by: {{ .Release.Service | quote }},
    },
  },
  data: {
    slapd.conf: {{ tpl (coalesce .Values.slapdConf.content (.Files.Get .Values.slapdConf.file)) . | quote }},
  },
}
{{ end }}
