---
suite: configmap-seed-ldif
templates:
  - templates/configmap-seed-ldif.yaml
tests:
  - it: does not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders from inline content
    set:
      seedData.content: |
        dn: dc=example,dc=org
        objectClass: top
        objectClass: dcObject
        objectClass: organization
        o: Example
        dc: example
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ldap-server-seed-ldif
      - matchRegex:
          path: data["seed.ldif"]
          pattern: dc=example,dc=org

  - it: does not render when existingConfigMap is set
    set:
      seedData.existingConfigMap: my-seed-config
    asserts:
      - hasDocuments:
          count: 0

  - it: templates content through tpl
    set:
      ldapServer.config.ldapBaseDn: dc=test,dc=org
      seedData.content: |
        dn: {{ .Values.ldapServer.config.ldapBaseDn }}
        objectClass: top
    asserts:
      - matchRegex:
          path: data["seed.ldif"]
          pattern: "dn: dc=test,dc=org"
...
