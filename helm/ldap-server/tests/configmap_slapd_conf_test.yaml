---
suite: configmap-slapd-conf
templates:
  - templates/configmap-slapd-conf.yaml
tests:
  - it: renders a ConfigMap from default file
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ldap-server-slapd-conf

  - it: templates base DN from the file
    asserts:
      - matchRegex:
          path: data["slapd.conf"]
          pattern: suffix\s+"dc=example,dc=org"
      - matchRegex:
          path: data["slapd.conf"]
          pattern: rootdn\s+"cn=admin,dc=example,dc=org"

  - it: includes rootpw.conf
    asserts:
      - matchRegex:
          path: data["slapd.conf"]
          pattern: include\s+/etc/ldap/rootpw.conf

  - it: uses custom base DN
    set:
      ldapServer.config.ldapBaseDn: dc=test,dc=net
    asserts:
      - matchRegex:
          path: data["slapd.conf"]
          pattern: suffix\s+"dc=test,dc=net"
      - matchRegex:
          path: data["slapd.conf"]
          pattern: rootdn\s+"cn=admin,dc=test,dc=net"

  - it: uses inline content when set
    set:
      slapdConf.content: |
        database mdb
        suffix "dc=inline,dc=org"
    asserts:
      - matchRegex:
          path: data["slapd.conf"]
          pattern: suffix "dc=inline,dc=org"

  - it: does not render when existingConfigMap is set
    set:
      slapdConf.existingConfigMap: my-slapd-config
    asserts:
      - hasDocuments:
          count: 0
...
