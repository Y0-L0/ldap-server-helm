---
suite: statefulset
templates:
  - templates/statefulset.yaml
tests:
  - it: renders a StatefulSet
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.replicas
          value: 1

  - it: has an init container for ldap-manager
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: ldap-manager-setup
      - equal:
          path: spec.template.spec.initContainers[0].args[0]
          value: setup

  - it: runs slapd with explicit command
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: slapd
      - equal:
          path: spec.template.spec.containers[0].command[0]
          value: slapd
      - contains:
          path: spec.template.spec.containers[0].args
          content: /etc/ldap/slapd.conf

  - it: has a sidecar for ldap-manager
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: ldap-manager-sidecar
      - equal:
          path: spec.template.spec.containers[1].args[0]
          value: sidecar

  - it: configures health probes on slapd via the sidecar endpoint
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 8080
      - notExists:
          path: spec.template.spec.containers[1].livenessProbe
      - notExists:
          path: spec.template.spec.containers[1].readinessProbe

  - it: uses generated secret name by default
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].env[0].valueFrom.secretKeyRef.name
          value: RELEASE-NAME-ldap-server-admin

  - it: uses existingSecret when set
    set:
      ldapServer.auth.existingSecret.name: my-secret
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].env[0].valueFrom.secretKeyRef.name
          value: my-secret

  - it: uses mapped key from existingSecret
    set:
      ldapServer.auth.existingSecret:
        name: my-secret
        keyMapping:
          password: my-password-key
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].env[0].valueFrom.secretKeyRef.key
          value: my-password-key

  - it: includes PVC template when persistence enabled
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: data

  - it: uses emptyDir when persistence disabled
    set:
      persistence.enabled: false
    asserts:
      - notExists:
          path: spec.volumeClaimTemplates

  - it: uses existingConfigMap for slapd-conf volume
    set:
      slapdConf.existingConfigMap: my-slapd-config
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: slapd-conf
            configMap:
              name: my-slapd-config
...
