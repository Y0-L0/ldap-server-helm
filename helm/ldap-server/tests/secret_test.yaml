---
suite: secret-admin
templates:
  - templates/secret-admin.yaml
tests:
  - it: renders a Secret when no existingSecret
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.password
          value: admin

  - it: does not render when existingSecret name is set
    set:
      ldapServer.auth.existingSecret.name: my-secret
    asserts:
      - hasDocuments:
          count: 0
...
