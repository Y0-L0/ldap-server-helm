---
# Based on https://github.com/y0-l0/helm-snoop/.golangci.yml
version: "2"

issues:
  max-same-issues: 50

formatters:
  enable:
    - goimports
    - gofumpt
    - golines
  settings:
    golines:
      max-len: 120

linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - copyloopvar
    - cyclop
    - dupl
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - funcorder
    - gocheckcompilerdirectives
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gomoddirectives
    - goprintffuncname
    - gosec
    - govet
    - iface
    - ineffassign
    - intrange
    - loggercheck
    - makezero
    - mirror
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - predeclared
    - reassign
    - recvcheck
    - revive
    - staticcheck
    - testableexamples
    - testifylint
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace

  settings:
    cyclop:
      max-complexity: 30
      package-average: 10.0

    errcheck:
      check-type-assertions: true

    gosec:
      excludes:
        - G104 # redundant with errcheck

    exhaustive:
      check:
        - switch
        - map

    funcorder:
      struct-method: false

    gochecksumtype:
      default-signifies-exhaustive: false

    gocognit:
      min-complexity: 20

    gocritic:
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false

    govet:
      enable-all: true
      disable:
        - fieldalignment
      settings:
        shadow:
          strict: false

    nakedret:
      max-func-lines: 0

    nolintlint:
      allow-no-explanation: [gocognit, goconst, golines]
      require-explanation: true
      require-specific: true

    perfsprint:
      strconcat: false

    reassign:
      patterns:
        - .*

    staticcheck:
      checks:
        - all
        - -ST1000 # incorrect or missing package comment
        - -ST1016 # use consistent method receiver names
        - -QF1008 # omit embedded fields from selector expression

    usetesting:
      os-temp-dir: true

  exclusions:
    warn-unused: true
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - text: exported \S+ \S+ should have comment( \(or a comment on this block\))? or be unexported
        linters: [revive]
      - path: _test\.go
        linters:
          - dupl
          - reassign
      - path: pkg/cli/config\.go
        linters: [gosec]
        text: G101  # configDefaults() contains file paths, not credentials; gosec misidentifies RootpwPath
